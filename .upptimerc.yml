# Change these first
owner: davidwaltre # Your GitHub organization or username, where this repository lives
repo: formenio-uptime # The name of this repository

sites:
  - name: App (Web-Formulare) - Haupt-Endpunkt
    url: $APP_ENDPUNKT
  - name: App (Web-Formulare) - Embed-Endpunkt
    url: $APP_EMBED_ENDPUNKT
  - name: Backend Server - User-Endpunkt
    url: $USER_ENDPUNKT
  - name: Support System
    url: $SUPPORT_SYSTEM

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.formenio.de
  # baseUrl: /your-repo-name
  # logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: Formenio Status
  introTitle: "**Formenio** System Status"
  introMessage: System-Status der Services und Endpunkte von [**Formenio.de**](https://formenio.de)
  navbar:
    - title: Status
      href: /
  theme: light

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
assignees:
  - davidwaltre
